<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />

    <!-- ===== PWA / App meta ===== -->
    <meta name="theme-color" content="#1a1a1a" />
    <meta name="application-name" content="Share Your Sketch" />
    <meta name="apple-mobile-web-app-title" content="Share Your Sketch" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- ===== SEO ===== -->
    <title>Share Your Sketch — Graffiti & Sketch Community</title>
    <meta
      name="description"
      content="Comparte tus bocetos online, participa en batallas mensuales, y conecta con artistas callejeros alrededor del mundo."
    />

    <!-- ===== Open Graph (social media previews) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Share Your Sketch" />
    <meta
      property="og:description"
      content="Comparte tus bocetos, participa en batallas y conecta con artistas de graffiti."
    />
    <meta property="og:image" content="%PUBLIC_URL%/logo512.png" />
    <meta property="og:url" content="https://shareyoursketch.com" />

    <!-- ===== Twitter Card ===== -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Share Your Sketch" />
    <meta
      name="twitter:description"
      content="Comparte tus bocetos y participa en batallas."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/logo512.png" />

    <!-- ===== Icons ===== -->
    <link rel="icon" type="image/svg+xml" href="%PUBLIC_URL%/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- ===== External CSS (kept: these are used across the app) ===== -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />

    <!-- Material Icons (used throughout the app for like/edit/delete icons) -->
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bungee+Shade&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
